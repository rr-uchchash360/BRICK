<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <filter id="shadowBlur">
      <feGaussianBlur stdDeviation="2"/>
    </filter>
    <filter id="contactBlur">
      <feGaussianBlur stdDeviation="0.8"/>
    </filter>
    <linearGradient id="topG" x1="0" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#DE7848"/>
      <stop offset="100%" stop-color="#C86030"/>
    </linearGradient>
    <linearGradient id="frontG" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#D4703C"/>
      <stop offset="45%" stop-color="#C86030"/>
      <stop offset="100%" stop-color="#A04820"/>
    </linearGradient>
    <linearGradient id="sideG" x1="0.3" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#A85024"/>
      <stop offset="100%" stop-color="#803818"/>
    </linearGradient>
  </defs>

  <ellipse cx="34" cy="54" rx="32" ry="7" fill="rgba(0,0,0,0.07)" filter="url(#shadowBlur)"/>
  <polygon points="12,51 38,57 56,51 30,45" fill="rgba(0,0,0,0.1)" filter="url(#contactBlur)"/>

  <g transform="rotate(-30 32 32)">
    <g stroke-linejoin="round" stroke-width="1.5">
      <polygon points="46,26 58,18 58,33 46,41" fill="url(#sideG)" stroke="url(#sideG)"/>
      <polygon points="4,26 16,18 58,18 46,26" fill="url(#topG)" stroke="url(#topG)"/>
      <polygon points="4,26 46,26 46,41 4,41" fill="url(#frontG)" stroke="url(#frontG)"/>
    </g>

    <polygon points="6,26 18,18 26,18 16,26" fill="rgba(255,230,200,0.07)"/>

    <line x1="4" y1="27" x2="16" y2="19" stroke="rgba(255,230,200,0.1)" stroke-width="1" stroke-linecap="round"/>
    <line x1="4" y1="40" x2="46" y2="40" stroke="rgba(0,0,0,0.07)" stroke-width="1.5" stroke-linecap="round"/>

    <circle cx="14" cy="33" r="0.6" fill="rgba(0,0,0,0.04)"/>
    <circle cx="28" cy="36" r="0.5" fill="rgba(0,0,0,0.03)"/>
    <circle cx="34" cy="30" r="0.6" fill="rgba(0,0,0,0.04)"/>
    <circle cx="22" cy="38" r="0.4" fill="rgba(0,0,0,0.03)"/>
    <circle cx="40" cy="35" r="0.5" fill="rgba(0,0,0,0.03)"/>
  </g>
</svg>
